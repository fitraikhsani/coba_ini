<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISAN ANTI-STUCK (5s)</title>
    <style>
        :root { --primary: #00f2ff; --bg: #0d1117; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: var(--bg); font-family: sans-serif; }
        
        /* Dashboard yang dipaksa tetap melayang */
        #ui-bot {
            position: fixed; top: 0; left: 0; width: 100%; height: 140px;
            background: #161b22; border-bottom: 3px solid var(--primary);
            z-index: 99999; padding: 10px; box-sizing: border-box;
            box-shadow: 0 5px 20px rgba(0,0,0,1);
        }

        #content-area {
            position: absolute; top: 140px; left: 0; width: 100%;
            height: calc(100% - 140px); border: none;
        }

        .status { background: #000; padding: 10px; border-radius: 8px; border: 1px solid #333; text-align: center; }
        #text { font-size: 11px; color: var(--primary); font-weight: bold; }
        .bar { width: 100%; background: #333; height: 6px; border-radius: 3px; margin-top: 8px; }
        #fill { background: var(--primary); width: 0%; height: 100%; transition: 0.5s; }
        button { width: 100%; padding: 10px; margin-top: 8px; background: var(--primary); border: none; font-weight: bold; border-radius: 5px; }
    </style>
</head>
<body>

<div id="ui-bot">
    <div style="text-align: center; color: #fff; font-size: 14px; margin-bottom: 5px;">ISAN AUTO-RUN (5 DETIK)</div>
    <div class="status">
        <div id="text">MENUNGGU AKTIVASI...</div>
        <div class="bar"><div id="fill"></div></div>
    </div>
    <button id="btn" onclick="jalankan()">GASPOL POIN!</button>
</div>

<iframe id="content-area" name="bot_frame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups" src="about:blank"></iframe>

<script>
    const DATA = [
        "https://www.bing.com/search?q=Berita+Medan+Tembung",
        "https://www.bing.com/search?q=Harga+Emas+Antam+Medan",
        "https://www.bing.com/search?q=Metode+AHP+Manual",
        "https://www.bing.com/search?q=Skripsi+Sistem+Informasi",
        "https://www.bing.com/search?q=Wisata+Sumatera+Utara",
        "https://www.msn.com/id-id/berita/other/ar-AA22WWCR",
        "https://www.msn.com/id-id/hiburan/berita/ar-AA22Y4xE",
        "https://www.msn.com/id-id/ekonomi/bisnis/ar-AA22Y8H8",
        "https://www.msn.com/id-id/ekonomi/ekonomi/ar-AA22XAhc",
        "https://www.msn.com/id-id/berita/other/ar-AA22Upk5"
    ];

    let index = 0;

    function jalankan() {
        document.getElementById('btn').style.display = "none";
        mulaiTugas();
    }

    function mulaiTugas() {
        if (index >= DATA.length) {
            document.getElementById('text').innerText = "MISI SELESAI!";
            alert("Poin Aman, San!");
            return;
        }

        let frame = document.getElementById('content-area');
        let target = DATA[index];

        document.getElementById('text').innerText = `PROSES TUGAS ${index + 1}...`;
        document.getElementById('fill').style.width = ((index + 1) / DATA.length * 100) + "%";

        // Trik: Load about:blank dulu buat 'membersihkan' sisa script MSN
        frame.src = "about:blank";
        
        setTimeout(() => {
            frame.src = target;
            index++;
            // Paksa bot pindah tugas tiap 5 detik (5000ms)
            setTimeout(mulaiTugas, 5000);
        }, 200); // Jeda tipis buat refresh frame
    }
</script>
</body>
</html>
