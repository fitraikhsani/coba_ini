<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISAN PUNYA - Iframe Control Engine</title>
    <style>
        :root { --primary: #00f2ff; --accent: #7000ff; --bg: #0d1117; --card: #161b22; }
        body { background: var(--bg); color: #c9d1d9; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow: hidden; }
        
        /* Dashboard Atas */
        .dashboard { 
            height: 45vh; background: var(--card); padding: 15px; 
            box-sizing: border-box; border-bottom: 2px solid var(--primary);
            display: flex; flex-direction: column; justify-content: center;
        }
        
        /* Jendela Bing Bawah */
        .view-port { height: 55vh; width: 100%; background: white; border: none; }

        h2 { color: var(--primary); margin: 0 0 10px 0; font-size: 18px; text-align: center; }
        
        .config-grid { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 8px; 
            background: rgba(0,0,0,0.3); padding: 10px; border-radius: 12px; margin-bottom: 10px;
        }
        .input-group { display: flex; flex-direction: column; }
        label { font-size: 9px; color: var(--primary); font-weight: bold; margin-bottom: 3px; }
        input { background: #010409; border: 1px solid #30363d; color: white; padding: 6px; border-radius: 5px; font-size: 12px; }

        .status-panel { text-align: center; margin-bottom: 10px; }
        #msg { font-size: 11px; color: #fff; margin-bottom: 5px; }
        .bar { width: 100%; background: #30363d; height: 6px; border-radius: 3px; overflow: hidden; }
        .fill { background: linear-gradient(90deg, var(--primary), var(--accent)); width: 0%; height: 100%; transition: 0.5s; }
        
        .btn-group { display: flex; gap: 10px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 12px; }
        #start-btn { background: var(--primary); color: #000; }
        #stop-btn { background: #da3633; color: white; display: none; }
    </style>
</head>
<body>

<div class="dashboard" id="control-panel">
    <h2>ISAN PUNYA</h2>
    
    <div class="config-grid" id="settings-ui">
        <div class="input-group">
            <label>JML CARI</label>
            <input type="number" id="in-s-qty" value="10">
        </div>
        <div class="input-group">
            <label>DELAY CARI (S)</label>
            <input type="number" id="in-s-del" value="7">
        </div>
        <div class="input-group">
            <label>JML BACA</label>
            <input type="number" id="in-r-qty" value="10">
        </div>
        <div class="input-group">
            <label>DELAY BACA (S)</label>
            <input type="number" id="in-r-del" value="10">
        </div>
    </div>

    <div class="status-panel">
        <div id="msg">SIAP JALANKAN</div>
        <div class="bar"><div id="fill" class="fill"></div></div>
        <div id="count-info" style="font-size: 10px; margin-top: 5px; color: var(--primary);">0 / 0 Tasks</div>
    </div>

    <div class="btn-group">
        <button id="start-btn" onclick="initBot()">START ENGINE</button>
        <button id="stop-btn" onclick="stopBot()">STOP</button>
    </div>
</div>

<iframe id="bot-frame" class="view-port" src="about:blank"></iframe>

<script>
    const KEYWORDS = ["Berita Medan", "AHP GIS Medan Tembung", "Wisata Sumut", "Harga Emas Antam", "Teknologi 2026", "Informasi Sistem", "Skripsi Isan"];
    const ARTICLES = [
        "https://www.msn.com/id-id/berita/other/ar-AA22WWCR",
        "https://www.msn.com/id-id/hiburan/berita/ar-AA22Y4xE",
        "https://www.msn.com/id-id/berita/other/ar-AA22S081",
        "https://www.msn.com/id-id/ekonomi/bisnis/ar-AA22Y8H8"
    ];

    let botData = { running: false, step: 0 };

    function initBot() {
        botData = {
            running: true,
            step: 0,
            sQty: parseInt(document.getElementById('in-s-qty').value),
            sDel: parseInt(document.getElementById('in-s-del').value) * 1000,
            rQty: parseInt(document.getElementById('in-r-qty').value),
            rDel: parseInt(document.getElementById('in-r-del').value) * 1000
        };

        document.getElementById('settings-ui').style.opacity = "0.3";
        document.getElementById('settings-ui').style.pointerEvents = "none";
        document.getElementById('start-btn').style.display = "none";
        document.getElementById('stop-btn').style.display = "block";
        
        runEngine();
    }

    function runEngine() {
        if (!botData.running) return;

        let total = botData.sQty + botData.rQty;
        if (botData.step >= total) {
            finishBot();
            return;
        }

        let frame = document.getElementById('bot-frame');
        let currentUrl = "";
        let currentDelay = 0;

        if (botData.step < botData.sQty) {
            // Fase Searching
            let kw = KEYWORDS[botData.step % KEYWORDS.length];
            document.getElementById('msg').innerText = `🔎 AUTO SEARCH: ${kw}`;
            currentUrl = `https://www.bing.com/search?q=${encodeURIComponent(kw)}`;
            currentDelay = botData.sDel;
        } else {
            // Fase Reading
            let readIdx = botData.step - botData.sQty;
            document.getElementById('msg').innerText = `📖 AUTO READING NEWS...`;
            currentUrl = ARTICLES[readIdx % ARTICLES.length];
            currentDelay = botData.rDel;
        }

        frame.src = currentUrl;
        
        // Update Progress
        botData.step++;
        document.getElementById('count-info').innerText = `${botData.step} / ${total} Tasks Completed`;
        document.getElementById('fill').style.width = (botData.step / total * 100) + "%";

        // Lanjut otomatis setelah delay
        setTimeout(runEngine, currentDelay);
    }

    function stopBot() {
        botData.running = false;
        location.reload();
    }

    function finishBot() {
        botData.running = false;
        document.getElementById('msg').innerText = "MISSION ACCOMPLISHED!";
        alert("Semua tugas selesai, San!");
        stopBot();
    }
</script>
</body>
</html>
